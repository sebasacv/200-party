<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡200 Años!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #0a0a0a;
    font-family: 'Inter', sans-serif;
    padding: 20px;
  }

  .download-btn {
    margin-bottom: 20px;
    padding: 12px 32px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 100px;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .download-btn:hover { transform: scale(1.05); }

  .card {
    width: 1080px;
    height: 1350px;
    position: relative;
    overflow: hidden;
    background: #0a0a0a;
  }

  /* Gradient blobs */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.4;
    z-index: 0;
  }
  .blob-1 { width: 500px; height: 500px; background: #ff6b35; top: -100px; right: -100px; }
  .blob-2 { width: 400px; height: 400px; background: #06d6a0; bottom: 100px; left: -80px; }
  .blob-3 { width: 300px; height: 300px; background: #a855f7; bottom: -50px; right: 100px; opacity: 0.25; }

  /* Content wrapper */
  .content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 60px;
  }

  /* Top: small label */
  .top-label {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 20px;
  }

  /* Big 200 */
  .big-200 {
    font-family: 'Inter', sans-serif;
    font-size: 200px;
    font-weight: 900;
    line-height: 0.85;
    color: #fff;
    letter-spacing: -8px;
    margin-bottom: 10px;
  }

  .tag-line {
    font-size: 32px;
    font-weight: 300;
    color: rgba(255,255,255,0.8);
    margin-bottom: 45px;
    letter-spacing: -0.5px;
  }
  .tag-line span {
    font-weight: 700;
    color: #fff;
  }

  /* Photo */
  .photo-frame {
    width: 100%;
    flex: 1;
    border-radius: 24px;
    overflow: hidden;
    position: relative;
    margin-bottom: 45px;
  }
  .photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 15%;
  }

  /* Names + ages row */
  .names-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 40px;
    gap: 10px;
  }
  .name-item {
    text-align: center;
    flex: 1;
  }
  .name-item .n-age {
    font-size: 48px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
    letter-spacing: -2px;
  }
  .name-item .n-name {
    font-size: 16px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .name-item .n-plus {
    font-size: 32px;
    font-weight: 300;
    color: rgba(255,255,255,0.25);
  }

  /* Bottom info */
  .bottom-info {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .info-left .date-text {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .info-left .time-text {
    font-size: 22px;
    font-weight: 400;
    color: rgba(255,255,255,0.6);
    margin-top: 2px;
  }

  .info-right {
    text-align: right;
  }
  .info-right .venue {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .info-right .venue-sub {
    font-size: 16px;
    font-weight: 400;
    color: rgba(255,255,255,0.4);
    margin-top: 2px;
  }

  /* Pill tag */
  .pill {
    display: inline-block;
    padding: 8px 20px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 100px;
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
</style>
</head>
